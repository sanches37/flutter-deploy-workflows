# Android Prod 배포 (Play Store production track) - reusable workflow
#
# 호출 측 예시:
#   on:
#     push:
#       tags: ['v*-prod-android']
#   jobs:
#     deploy:
#       uses: sanches37/flutter-deploy-workflows/.github/workflows/android-prod.yml@v1
#       with:
#         package_name: com.lifeadmin.app
#       secrets: inherit

name: Android Prod (Play Store)

on:
  workflow_call:
    inputs:
      package_name:
        type: string
        required: true
      flutter_version:
        type: string
        default: '3.32.2'
      java_version:
        type: string
        default: '17'
      flavor:
        type: string
        default: 'prod'
      track:
        type: string
        default: 'production'
      runner:
        type: string
        default: 'ubuntu-latest'
    secrets:
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON:
        required: true
      RELEASE_KEYSTORE_BASE64:
        required: true
      RELEASE_KEYSTORE_PASSWORD:
        required: true
      RELEASE_KEY_PASSWORD:
        required: true
      RELEASE_KEY_ALIAS:
        required: true
      PLUGIN_GIT_TOKEN:
        required: false
      MATCH_GIT_TOKEN:
        required: false
        description: 'PLUGIN_GIT_TOKEN 미설정 시 fallback'
      ENV_RELEASE:
        required: false

jobs:
  build-and-deploy:
    name: Build AAB & Upload to Play Store
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main branch
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        run: |
          if ! git branch -r --contains ${{ github.sha }} | grep -q 'origin/main'; then
            echo "::error::운영 배포 태그는 main 브랜치에서만"
            exit 1
          fi

      - name: Extract version + verify pubspec match
        id: version
        env:
          GH_EVENT: ${{ github.event_name }}
          GH_REF: ${{ github.ref }}
          GH_REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "$GH_EVENT" == "push" && "$GH_REF" == refs/tags/* ]]; then
            VERSION=$(echo "$GH_REF_NAME" | sed 's/^v//' | sed -E 's/-(prod|dev)-(ios|android|all)$//')
            PUBSPEC_VERSION=$(grep "^version:" pubspec.yaml | sed 's/version: //')
            if [ "$VERSION" != "$PUBSPEC_VERSION" ]; then
              echo "::error::Tag ($VERSION) != pubspec ($PUBSPEC_VERSION)"
              exit 1
            fi
          else
            VERSION=$(grep "^version:" pubspec.yaml | sed 's/version: //')
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ inputs.java_version }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version }}
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Decode .env.release (optional)
        if: env.ENV_RELEASE != ''
        env:
          ENV_RELEASE: ${{ secrets.ENV_RELEASE }}
        run: echo "$ENV_RELEASE" | base64 --decode > .env.release

      - name: Generate code (build_runner)
        run: |
          if grep -q "build_runner" pubspec.yaml; then
            dart run build_runner build --delete-conflicting-outputs
          fi

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/app/keystore
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore/release.jks
          # key.properties (build.gradle.kts에서 load 가정)
          cat > android/key.properties <<PROPS
          storeFile=keystore/release.jks
          storePassword=${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.RELEASE_KEY_ALIAS }}
          keyPassword=${{ secrets.RELEASE_KEY_PASSWORD }}
          PROPS
          echo "✅ Keystore + key.properties prepared"

      - name: Decode Google Play service account JSON
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          GOOGLE_PLAY_JSON_PATH="$RUNNER_TEMP/google-play-service-account.json"
          echo "$GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" > "$GOOGLE_PLAY_JSON_PATH"
          echo "GOOGLE_PLAY_JSON_KEY_PATH=$GOOGLE_PLAY_JSON_PATH" >> "$GITHUB_ENV"

      # 릴리스 노트(distribution/whatsnew/whatsnew-{LOCALE})를
      # android/fastlane/metadata/android/{LOCALE}/changelogs/{versionCode}.txt 로 복사.
      # Play Store가 새 빌드 changelog로 인식하려면 versionCode 이름의 .txt 파일 필요.
      - name: Setup changelogs (whatsnew → metadata/changelogs)
        if: hashFiles('distribution/whatsnew/whatsnew-*') != ''
        env:
          VERSION_FULL: ${{ steps.version.outputs.version }}
        run: |
          # 1.0.1+17 → 17 (versionCode)
          VERSION_CODE=$(echo "$VERSION_FULL" | grep -oE '\+[0-9]+$' | tr -d '+')
          if [ -z "$VERSION_CODE" ]; then
            echo "::warning::versionCode 추출 실패 ($VERSION_FULL) — changelog 스킵"
            exit 0
          fi
          for WHATSNEW_FILE in distribution/whatsnew/whatsnew-*; do
            [ -f "$WHATSNEW_FILE" ] || continue
            LOCALE=$(basename "$WHATSNEW_FILE" | sed 's/whatsnew-//')
            CHANGELOG_DIR="android/fastlane/metadata/android/${LOCALE}/changelogs"
            mkdir -p "$CHANGELOG_DIR"
            cp "$WHATSNEW_FILE" "$CHANGELOG_DIR/${VERSION_CODE}.txt"
            echo "✅ Changelog: ${LOCALE}/${VERSION_CODE}.txt"
          done

      - name: Build AAB
        run: flutter build appbundle --release --flavor ${{ inputs.flavor }}

      - name: Verify AAB + export path
        run: |
          # Flutter는 보통 build/app/outputs/bundle/${flavor}Release/app-${flavor}-release.aab
          AAB_FILE=$(find build/app/outputs/bundle -name "*.aab" | head -1)
          [ -f "$AAB_FILE" ] || { echo "::error::AAB not found"; ls -R build/app/outputs/bundle 2>/dev/null || true; exit 1; }
          AAB_PATH="$GITHUB_WORKSPACE/$AAB_FILE"
          echo "AAB_PATH=$AAB_PATH" >> "$GITHUB_ENV"
          echo "📦 AAB: $AAB_PATH ($(du -h "$AAB_FILE" | cut -f1))"

      - name: Setup Ruby + Bundler
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          working-directory: android
          bundler-cache: true

      - name: Configure git auth for private gem
        env:
          PLUGIN_GIT_TOKEN: ${{ secrets.PLUGIN_GIT_TOKEN || secrets.MATCH_GIT_TOKEN }}
        run: |
          if [ -n "$PLUGIN_GIT_TOKEN" ]; then
            git config --global url."https://x-access-token:${PLUGIN_GIT_TOKEN}@github.com/".insteadOf "https://github.com/"
          fi

      - name: Bundle install (android/Gemfile)
        working-directory: android
        run: bundle install --jobs=4

      - name: Fastlane — Play Store 업로드
        working-directory: android
        env:
          GOOGLE_PLAY_JSON_KEY_PATH: ${{ env.GOOGLE_PLAY_JSON_KEY_PATH }}
          AAB_PATH: ${{ env.AAB_PATH }}
        run: bundle exec fastlane prod_release

      - name: Summary
        run: |
          echo "✅ Play Store ${{ inputs.track }} 업로드 완료"
          echo "Package: ${{ inputs.package_name }}"
          echo "Version: ${{ steps.version.outputs.version }}"
          echo ""
          echo "⚠️  Managed Publishing이 활성화되어 있다면 Play Console에서 수동 게시하세요."
