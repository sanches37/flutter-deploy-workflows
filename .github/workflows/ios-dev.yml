# iOS Dev 배포 (TestFlight Internal Testing) - reusable workflow
#
# 호출 측 예시:
#   on:
#     push:
#       tags: ['v*-dev-ios']
#   jobs:
#     deploy:
#       uses: sanches37/flutter-deploy-workflows/.github/workflows/ios-dev.yml@v1.5.0
#       with:
#         bundle_id_dev: com.lifeadmin.app.dev
#         apple_team_id: <Apple Team ID>
#       secrets: inherit
#
# v1.5.0: DEPLOY_WF_REF 하드코딩 — github.workflow_ref가 caller ref를 반환하는 문제 우회.

name: iOS Dev (TestFlight Internal)

on:
  workflow_call:
    inputs:
      bundle_id_dev:
        type: string
        required: true
        description: 'Dev Bundle ID (예: com.lifeadmin.app.dev)'
      apple_team_id:
        type: string
        required: true
      flutter_version:
        type: string
        default: '3.32.2'
      flavor:
        type: string
        default: ''
        description: 'Flutter flavor (비워두면 --flavor 인수 없이 빌드)'
      runner:
        type: string
        default: 'macos-latest'
    secrets:
      ASC_KEY_ID:
        required: true
      ASC_ISSUER_ID:
        required: true
      ASC_PRIVATE_KEY:
        required: true
      MATCH_PASSWORD:
        required: true
      MATCH_GIT_TOKEN:
        required: true
      PLUGIN_GIT_TOKEN:
        required: false
      ENV_DEV:
        required: false

jobs:
  build-and-deploy:
    name: Build & Upload to TestFlight Internal
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 60
    env:
      DEPLOY_WF_REF: refs/tags/v1.5.6

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout workflow actions
        uses: actions/checkout@v4
        with:
          repository: sanches37/flutter-deploy-workflows
          ref: ${{ env.DEPLOY_WF_REF }}
          path: .gha

      - name: Verify version (tag↔pubspec, dev는 main 강제 X)
        id: version
        uses: ./.gha/.github/actions/verify-version
        with:
          enforce-main: 'false'

      - name: Decode .env.dev + create .env.prod stub
        shell: bash
        env:
          ENV_DEV: ${{ secrets.ENV_DEV }}
        run: |
          if [ -n "$ENV_DEV" ]; then
            echo "$ENV_DEV" | base64 --decode > .env.dev
            echo "✅ .env.dev decoded"
          fi
          [ -f .env.dev ] && { [ -f .env.prod ] || cp .env.dev .env.prod; }

      - name: Setup Flutter (+ build_runner)
        uses: ./.gha/.github/actions/setup-flutter
        with:
          flutter-version: ${{ inputs.flutter_version }}

      - name: Setup CocoaPods
        shell: bash
        run: |
          if ! pod --version &> /dev/null; then
            arch -arm64 brew reinstall cocoapods || arch -arm64 brew install cocoapods
          fi
          cd ios && arch -arm64 pod install --repo-update

      - name: Setup Ruby (+ private gem auth + bundle)
        uses: ./.gha/.github/actions/setup-ruby
        with:
          working-directory: ios
          gem-token: ${{ secrets.PLUGIN_GIT_TOKEN || secrets.MATCH_GIT_TOKEN }}

      - name: Setup iOS signing (match + ExportOptions.plist)
        uses: ./.gha/.github/actions/setup-ios-signing
        with:
          bundle-id: ${{ inputs.bundle_id_dev }}
          apple-team-id: ${{ inputs.apple_team_id }}
          match-password: ${{ secrets.MATCH_PASSWORD }}
          match-git-token: ${{ secrets.MATCH_GIT_TOKEN }}
          match-type: appstore
          working-directory: ios

      - name: Set Manual Signing in project.pbxproj
        shell: bash
        env:
          BUNDLE_ID: ${{ inputs.bundle_id_dev }}
        run: |
          PROJECT_FILE="ios/Runner.xcodeproj/project.pbxproj"
          PROFILE_NAME="match AppStore ${BUNDLE_ID}"

          # CODE_SIGN_STYLE: Automatic → Manual (전체)
          perl -pi -e 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' "$PROJECT_FILE"
          # CODE_SIGN_IDENTITY → Apple Distribution (iphoneos)
          perl -pi -e 's/"CODE_SIGN_IDENTITY\[sdk=iphoneos\*\]" = "iPhone Developer";/"CODE_SIGN_IDENTITY[sdk=iphoneos*]" = "Apple Distribution";/g' "$PROJECT_FILE"

          # Runner target 블록에만 PROVISIONING_PROFILE_SPECIFIER 추가
          # (PRODUCT_BUNDLE_IDENTIFIER = com.lifeadmin.mobile 가 있고 .RunnerTests 아닌 블록)
          BUNDLE_ID="$BUNDLE_ID" PROFILE_NAME="$PROFILE_NAME" ruby << 'RUBY_EOF'
          file_path = "ios/Runner.xcodeproj/project.pbxproj"
          profile_name = ENV['PROFILE_NAME']
          bundle_id = ENV['BUNDLE_ID']
          content = File.read(file_path)
          unless content.include?('PROVISIONING_PROFILE_SPECIFIER')
            content = content.gsub(/(PRODUCT_BUNDLE_IDENTIFIER = #{Regexp.escape(bundle_id)};)/) do |match|
              "#{match}\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = \"#{profile_name}\";"
            end
            File.write(file_path, content)
            puts "✅ PROVISIONING_PROFILE_SPECIFIER = #{profile_name}"
          end
          RUBY_EOF
          echo "✅ Manual signing configured"

      - name: Build IPA
        env:
          TMPDIR: ${{ runner.temp }}/xcode-dev
          FLAVOR: ${{ inputs.flavor }}
        run: |
          mkdir -p "$TMPDIR"
          FLAVOR_ARGS=""
          [ -n "$FLAVOR" ] && FLAVOR_ARGS="--flavor $FLAVOR"
          flutter build ipa --release $FLAVOR_ARGS --export-options-plist=ios/ExportOptions.plist

      - name: Verify IPA + export path
        run: |
          IPA_FILE=$(find build/ios/ipa -name "*.ipa" | head -1)
          [ -f "$IPA_FILE" ] || { echo "::error::IPA not found"; exit 1; }
          IPA_PATH="$GITHUB_WORKSPACE/$IPA_FILE"
          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"

      - name: Fastlane — TestFlight Internal 업로드
        working-directory: ios
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          IPA_PATH: ${{ env.IPA_PATH }}
        run: bundle exec fastlane dev_release

      - name: Summary
        run: |
          echo "✅ TestFlight Internal Testing 업로드 완료"
          echo "Bundle: ${{ inputs.bundle_id_dev }}"
          echo "Version: ${{ steps.version.outputs.version }}"
