# iOS Dev 배포 (TestFlight Internal Testing) - reusable workflow
#
# 호출 측 예시:
#   on:
#     push:
#       tags: ['v*-dev-ios']
#   jobs:
#     deploy:
#       uses: sanches37/flutter-deploy-workflows/.github/workflows/ios-dev.yml@v1.6.0
#       with:
#         apple_team_id: <Apple Team ID>
#         flutter_version: '3.41.7'
#       secrets: inherit
#
# v1.6.0: ios_sign_and_build 통합 — setup_ci + match + build + 업로드가 단일 fastlane 레인으로 통합.
#         Fastfile에 dev_build_and_release 레인 필요 (sanches37_deploy v0.2.0+).

name: iOS Dev (TestFlight Internal)

on:
  workflow_call:
    inputs:
      apple_team_id:
        type: string
        required: true
      bundle_id_dev:
        type: string
        required: false
        default: ''
        description: '표시용 Bundle ID (Fastfile에서 실제 값 관리)'
      flutter_version:
        type: string
        default: '3.32.2'
      flavor:
        type: string
        default: ''
        description: 'Flutter flavor (비워두면 --flavor 인수 없이 빌드)'
      runner:
        type: string
        default: 'macos-latest'
    secrets:
      ASC_KEY_ID:
        required: true
      ASC_ISSUER_ID:
        required: true
      ASC_PRIVATE_KEY:
        required: true
      MATCH_PASSWORD:
        required: true
      MATCH_GIT_TOKEN:
        required: true
      PLUGIN_GIT_TOKEN:
        required: false
      ENV_DEV:
        required: false

jobs:
  build-and-deploy:
    name: Build & Upload to TestFlight Internal
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 60
    env:
      DEPLOY_WF_REF: refs/tags/v1.6.1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout workflow actions
        uses: actions/checkout@v4
        with:
          repository: sanches37/flutter-deploy-workflows
          ref: ${{ env.DEPLOY_WF_REF }}
          path: .gha

      - name: Verify version (tag↔pubspec, dev는 main 강제 X)
        id: version
        uses: ./.gha/.github/actions/verify-version
        with:
          enforce-main: 'false'

      - name: Decode .env.dev + create .env.prod stub
        shell: bash
        env:
          ENV_DEV: ${{ secrets.ENV_DEV }}
        run: |
          if [ -n "$ENV_DEV" ]; then
            echo "$ENV_DEV" | base64 --decode > .env.dev
            echo "✅ .env.dev decoded"
          fi
          [ -f .env.dev ] && { [ -f .env.prod ] || cp .env.dev .env.prod; }

      - name: Setup Flutter (+ build_runner)
        uses: ./.gha/.github/actions/setup-flutter
        with:
          flutter-version: ${{ inputs.flutter_version }}

      - name: Setup Ruby (+ private gem auth + bundle)
        uses: ./.gha/.github/actions/setup-ruby
        with:
          working-directory: ios
          gem-token: ${{ secrets.PLUGIN_GIT_TOKEN || secrets.MATCH_GIT_TOKEN }}

      - name: Setup CocoaPods (Setup Ruby 이후 — 동일 Ruby 환경)
        shell: bash
        run: |
          # setup-ruby가 PATH를 바꾼 뒤 pod가 다른 Ruby로 실행될 수 있음.
          # pod --version 실패 시 현재 활성 Ruby로 cocoapods 재설치.
          if ! pod --version &> /dev/null 2>&1; then
            gem install cocoapods --no-document
          fi
          cd ios && arch -arm64 pod install --repo-update

      - name: Fastlane — 빌드 + 서명 + TestFlight Internal 업로드
        working-directory: ios
        env:
          APPLE_TEAM_ID: ${{ inputs.apple_team_id }}
          MATCH_GIT_TOKEN: ${{ secrets.MATCH_GIT_TOKEN }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          FLUTTER_ARGS: ${{ inputs.flavor != '' && format('--flavor {0}', inputs.flavor) || '' }}
          TMPDIR: ${{ runner.temp }}/xcode-dev
        run: |
          mkdir -p "$TMPDIR"
          bundle exec fastlane dev_build_and_release

      - name: Summary
        run: |
          echo "✅ TestFlight Internal Testing 업로드 완료"
          echo "Bundle: ${{ inputs.bundle_id_dev }}"
          echo "Version: ${{ steps.version.outputs.version }}"
