# iOS Prod 배포 (App Store) - reusable workflow
#
# 호출 측 예시 (life_admin/.github/workflows/deploy-ios-prod.yml):
#   on:
#     push:
#       tags: ['v*-prod-ios']
#   jobs:
#     deploy:
#       uses: sanches37/flutter-deploy-workflows/.github/workflows/ios-prod.yml@v1
#       with:
#         bundle_id: com.lifeadmin.app
#         apple_team_id: <Apple Team ID>
#       secrets: inherit
#
# v1.1.0: 4개 composite (setup-flutter, setup-ruby, setup-ios-signing, verify-version)로 추출.

name: iOS Prod (App Store)

on:
  workflow_call:
    inputs:
      bundle_id:
        type: string
        required: true
        description: 'Prod Bundle ID (예: com.lifeadmin.app)'
      apple_team_id:
        type: string
        required: true
        description: 'Apple Developer Team ID'
      flutter_version:
        type: string
        default: '3.32.2'
      flavor:
        type: string
        default: 'prod'
        description: 'Flutter flavor (Release-Prod.xcconfig 매칭)'
      runner:
        type: string
        default: 'macos-latest'
    secrets:
      ASC_KEY_ID:
        required: true
      ASC_ISSUER_ID:
        required: true
      ASC_PRIVATE_KEY:
        required: true
      MATCH_PASSWORD:
        required: true
      MATCH_GIT_TOKEN:
        required: true
        description: 'sanches37/match-certificates 접근용 PAT (repo 스코프)'
      PLUGIN_GIT_TOKEN:
        required: false
        description: 'sanches37/fastlane-plugin-sanches37_deploy private 접근용 PAT. 미설정 시 MATCH_GIT_TOKEN 재사용'
      ENV_RELEASE:
        required: false
        description: 'base64 인코딩된 .env.release 파일 (선택)'

jobs:
  build-and-deploy:
    name: Build & Submit to App Store
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify version (main 강제 + tag↔pubspec match)
        id: version
        uses: ./.github/actions/verify-version
        with:
          enforce-main: 'true'

      - name: Setup Flutter (+ env decode + build_runner)
        uses: ./.github/actions/setup-flutter
        with:
          flutter-version: ${{ inputs.flutter_version }}
          env-file-name: '.env.release'
          env-file-content: ${{ secrets.ENV_RELEASE }}

      - name: "Setup CocoaPods (베달판 보존: 깨졌으면 reinstall)"
        shell: bash
        run: |
          if ! pod --version &> /dev/null; then
            echo "📦 CocoaPods not working, reinstalling via Homebrew..."
            arch -arm64 brew reinstall cocoapods || arch -arm64 brew install cocoapods
          fi
          echo "✅ CocoaPods version: $(pod --version)"
          cd ios && arch -arm64 pod install --repo-update

      - name: Setup Ruby (+ private gem auth + bundle)
        uses: ./.github/actions/setup-ruby
        with:
          working-directory: ios
          gem-token: ${{ secrets.PLUGIN_GIT_TOKEN || secrets.MATCH_GIT_TOKEN }}

      - name: Setup iOS signing (match + ExportOptions.plist)
        uses: ./.github/actions/setup-ios-signing
        with:
          bundle-id: ${{ inputs.bundle_id }}
          apple-team-id: ${{ inputs.apple_team_id }}
          match-password: ${{ secrets.MATCH_PASSWORD }}
          match-git-token: ${{ secrets.MATCH_GIT_TOKEN }}
          match-type: appstore
          working-directory: ios

      - name: Clean build artifacts
        shell: bash
        run: |
          rm -rf build/ios || true
          rm -rf ios/build || true
          rm -rf ~/Library/Developer/Xcode/DerivedData/* 2>/dev/null || true
          rm -rf /var/folders/*/*/XcodeDistPipeline* 2>/dev/null || true
          flutter clean
          flutter pub get
          cd ios && arch -arm64 pod install

      - name: Build IPA (TMPDIR 격리로 codesign 충돌 방지)
        env:
          TMPDIR: ${{ runner.temp }}/xcode-prod
        run: |
          mkdir -p "$TMPDIR"
          flutter build ipa --release --flavor ${{ inputs.flavor }} --export-options-plist=ios/ExportOptions.plist

      - name: Verify IPA + export absolute path
        run: |
          IPA_FILE=$(find build/ios/ipa -name "*.ipa" | head -1)
          if [ ! -f "$IPA_FILE" ]; then
            echo "::error::IPA not found"
            ls -la build/ios/ipa/ 2>/dev/null || true
            exit 1
          fi
          IPA_PATH="$GITHUB_WORKSPACE/$IPA_FILE"
          echo "✅ IPA: $IPA_PATH ($(du -h "$IPA_FILE" | cut -f1))"
          echo "IPA_PATH=$IPA_PATH" >> "$GITHUB_ENV"

      - name: Fastlane — TestFlight + 심사 제출 (sanches37_deploy plugin)
        working-directory: ios
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          IPA_PATH: ${{ env.IPA_PATH }}
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: bundle exec fastlane prod_release_and_submit

      - name: Deployment summary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "========================================="
          echo "  ✅ iOS App Store 심사 제출 완료"
          echo "========================================="
          echo "Version:   $VERSION"
          echo "Bundle ID: ${{ inputs.bundle_id }}"
          echo "Tag:       ${{ github.ref_name }}"
          echo ""
          echo "📱 App Store Connect: https://appstoreconnect.apple.com/apps"
