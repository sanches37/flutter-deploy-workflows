# iOS Prod 배포 (App Store) - reusable workflow
#
# 호출 측 예시:
#   on:
#     push:
#       tags: ['v*-prod-ios']
#   jobs:
#     deploy:
#       uses: sanches37/flutter-deploy-workflows/.github/workflows/ios-prod.yml@v1.6.0
#       with:
#         apple_team_id: <Apple Team ID>
#         flutter_version: '3.41.7'
#       secrets: inherit
#
# v1.6.0: ios_sign_and_build 통합 — setup_ci + match + build + 심사제출이 단일 fastlane 레인으로 통합.
#         Fastfile에 prod_build_and_submit 레인 필요 (sanches37_deploy v0.2.0+).

name: iOS Prod (App Store)

on:
  workflow_call:
    inputs:
      apple_team_id:
        type: string
        required: true
        description: 'Apple Developer Team ID'
      bundle_id:
        type: string
        required: false
        default: ''
        description: '표시용 Bundle ID (Fastfile에서 실제 값 관리)'
      flutter_version:
        type: string
        default: '3.32.2'
      flavor:
        type: string
        default: ''
        description: 'Flutter flavor (비워두면 --flavor 인수 없이 빌드)'
      runner:
        type: string
        default: 'macos-latest'
    secrets:
      ASC_KEY_ID:
        required: true
      ASC_ISSUER_ID:
        required: true
      ASC_PRIVATE_KEY:
        required: true
      MATCH_PASSWORD:
        required: true
      MATCH_GIT_TOKEN:
        required: true
        description: 'sanches37/match-certificates 접근용 PAT (repo 스코프)'
      PLUGIN_GIT_TOKEN:
        required: false
        description: 'sanches37/fastlane-plugin-sanches37_deploy private 접근용 PAT. 미설정 시 MATCH_GIT_TOKEN 재사용'
      ENV_PROD:
        required: false
        description: 'base64 인코딩된 .env.prod 파일 (선택)'

jobs:
  build-and-deploy:
    name: Build & Submit to App Store
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 60
    env:
      DEPLOY_WF_REF: refs/tags/v1.6.2

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout workflow actions
        uses: actions/checkout@v4
        with:
          repository: sanches37/flutter-deploy-workflows
          ref: ${{ env.DEPLOY_WF_REF }}
          path: .gha

      - name: Verify version (main 강제 + tag↔pubspec match)
        id: version
        uses: ./.gha/.github/actions/verify-version
        with:
          enforce-main: 'true'

      - name: Decode .env.prod + create .env.dev stub
        shell: bash
        env:
          ENV_PROD: ${{ secrets.ENV_PROD }}
        run: |
          if [ -n "$ENV_PROD" ]; then
            echo "$ENV_PROD" | base64 --decode > .env.prod
            echo "✅ .env.prod decoded"
          fi
          [ -f .env.prod ] && { [ -f .env.dev ] || cp .env.prod .env.dev; }

      - name: Setup Flutter (+ build_runner)
        uses: ./.gha/.github/actions/setup-flutter
        with:
          flutter-version: ${{ inputs.flutter_version }}

      - name: Setup Ruby (+ private gem auth + bundle)
        uses: ./.gha/.github/actions/setup-ruby
        with:
          working-directory: ios
          gem-token: ${{ secrets.PLUGIN_GIT_TOKEN || secrets.MATCH_GIT_TOKEN }}

      - name: Setup CocoaPods (Setup Ruby 이후 — 동일 Ruby 환경)
        shell: bash
        run: |
          # setup-ruby가 PATH를 바꾼 뒤 pod가 다른 Ruby로 실행될 수 있음.
          # cocoapods는 ios/Gemfile에 선언돼 bundle install로 함께 설치됨.
          echo "✅ CocoaPods version: $(bundle exec pod --version)"
          cd ios && arch -arm64 bundle exec pod install --repo-update

      - name: Fastlane — 빌드 + 서명 + TestFlight + 심사 제출
        working-directory: ios
        env:
          APPLE_TEAM_ID: ${{ inputs.apple_team_id }}
          MATCH_GIT_TOKEN: ${{ secrets.MATCH_GIT_TOKEN }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          FLUTTER_ARGS: ${{ inputs.flavor != '' && format('--flavor {0}', inputs.flavor) || '' }}
          TMPDIR: ${{ runner.temp }}/xcode-prod
        run: |
          mkdir -p "$TMPDIR"
          bundle exec fastlane prod_build_and_submit

      - name: Deployment summary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "========================================="
          echo "  ✅ iOS App Store 심사 제출 완료"
          echo "========================================="
          echo "Version:   $VERSION"
          echo "Bundle ID: ${{ inputs.bundle_id }}"
          echo "Tag:       ${{ github.ref_name }}"
          echo ""
          echo "📱 App Store Connect: https://appstoreconnect.apple.com/apps"
